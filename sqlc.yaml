version: "1"
packages:
  - name: "store"
    path: "./internal/store"
    queries: "./internal/store/queries.sql"
    schema: "./schema/schema.sql"
    engine: "postgresql"
    emit_json_tags: true
    emit_prepared_queries: false
    emit_interface: false
    emit_exact_table_names: false
    emit_empty_slices: true
